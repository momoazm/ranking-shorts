name: momoclips - World Cup single clips

# Polls YouTube every ~20 min for a FRESH World-Cup moment (viral clips / fan+streamer
# reactions -- goals moved to the LIVE watcher worldcup_live.yml on 2026-07-06, and no
# third-party iShowSpeed uploads), builds ONE branded vertical Short from it, and posts to YouTube +
# Instagram (@momoclips). Dedup (state/used_clips.json) means the same clip is never reposted;
# if nothing new is found the run posts nothing -- that's the "trigger only when something
# happened" behaviour. Runs on GitHub-hosted ubuntu; yt-dlp routes through WARP (YouTube
# bot-checks datacenter IPs). See tools/clip_autopost.py.
#
# LIVE (2026-07-04): the 20-min schedule is ENABLED -- it auto-posts every 20 min when a fresh
# clip is found (dedup + daily cap MAX_DAILY_CLIPS=8 keep it from flooding). Scheduled runs post
# YouTube = PUBLIC by default (Moemen's go-ahead 2026-07-05); Instagram has no unlisted, so IG
# Reels are public on every live run anyway.
# Copyright: official goal footage is heavily Content-ID-claimed; posting it is an accepted risk
# (decision log 2026-07-04). To PAUSE: re-comment the schedule, or disable the workflow in the
# GitHub Actions UI.

on:
  schedule:
    # Hourly (2026-07-10; was */20). GitHub silently drops most ticks when the account asks
    # for hundreds/day -- the */15+*/15+*/20 trio was delivered as ~3 batched runs/day EACH,
    # which also delayed clipping-auto's and follower-race's daily crons by hours. Fewer,
    # spaced ticks actually get DELIVERED more often; posts still dedupe on used_clips.json.
    - cron: "29 * * * *"
  workflow_dispatch:
    inputs:
      privacy:
        description: "YouTube privacy for this run"
        type: choice
        options: [public, unlisted, private]
        default: public
      no_upload:
        description: "Build only, post nothing (safest test)"
        type: boolean
        default: false
      window:
        description: "Upload-date window to search"
        type: choice
        options: [today, week]
        default: today
      categories:
        description: "Categories to search. Priority: iShowSpeed first, then other events (goals belong to the LIVE watcher)."
        type: string
        default: "speed,popular,streamer"

# One run at a time; don't cancel a run that may be mid-upload.
concurrency:
  group: worldcup-clips
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  clip:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      # Persist the posted-clip history across runs so the same clip is never reposted.
      - name: Restore posted-clip history
        uses: actions/cache@v4
        with:
          path: state
          key: momoclips-used-${{ github.run_id }}
          restore-keys: |
            momoclips-used-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: System deps (ffmpeg w/ libass for the burned title card)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-liberation

      - name: Python deps
        run: |
          pip install --upgrade pip
          if ! pip install -r requirements.txt; then
            pip install python-dotenv groq edge-tts imageio-ffmpeg google-api-python-client google-auth google-auth-httplib2 requests httpx tavily-python exa-py yt-dlp
          fi
          pip install --upgrade yt-dlp
          # PO-token provider plugin (auto-discovered by yt-dlp) -- beats the datacenter bot-wall.
          pip install --upgrade bgutil-ytdlp-pot-provider

      - name: Start Cloudflare WARP (SOCKS proxy for yt-dlp egress)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq && sudo apt-get install -y -qq cloudflare-warp
          for i in 1 2 3 4; do
            warp-cli --accept-tos registration new && break || sleep 15
          done
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          # Poll until WARP is actually Connected -- a fixed sleep is too flaky (status can still
          # be "Connecting" after 5s, which makes every proxied yt-dlp search fail instantly).
          for i in $(seq 1 40); do
            if warp-cli --accept-tos status | grep -q "Connected"; then echo "WARP connected"; break; fi
            sleep 3
          done
          warp-cli --accept-tos status
          # Hard gate: confirm real egress through the SOCKS proxy before continuing.
          if ! curl -s --max-time 25 --proxy socks5h://127.0.0.1:40000 https://ifconfig.me; then
            echo "::error::WARP proxy egress check failed -- yt-dlp would be bot-blocked"; exit 1
          fi
          echo
          # PO-token provider (BgUtils): Docker token server on localhost:4416 so yt-dlp's web/tv
          # clients mint valid proof-of-origin tokens and stop getting bot-walled on datacenter IPs
          # (WARP alone started failing on the MrBeast pipeline 2026-07-08).
          docker run --name bgutil-provider -d --init -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider
          for i in $(seq 1 30); do
            curl -s --max-time 5 http://127.0.0.1:4416/ >/dev/null 2>&1 && { echo "POT provider up"; break; }
            sleep 2
          done

      - name: Reconstruct secrets (never committed)
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: |
          python3 - <<'EOF'
          import os
          if not os.environ.get("YOUTUBE_TOKEN_JSON"):
              raise SystemExit("::error::YOUTUBE_TOKEN_JSON secret is empty")
          with open("token.json", "w", encoding="utf-8") as f:
              f.write(os.environ["YOUTUBE_TOKEN_JSON"])
          if os.environ.get("GMAIL_TOKEN_JSON"):
              with open("gmail_token.json", "w", encoding="utf-8") as f:
                  f.write(os.environ["GMAIL_TOKEN_JSON"])
          keys = ["GROQ_API_KEY", "GEMINI_API_KEY", "IG_USER_ID", "IG_ACCESS_TOKEN",
                  "GMAIL_SENDER_EMAIL", "GMAIL_TO", "ZERNIO_API_URL", "ZERNIO_API_KEY",
                  "ZERNIO_YOUTUBE_ID", "ZERNIO_INSTAGRAM_ID", "CALLMEBOT_PHONE", "CALLMEBOT_APIKEY"]
          lines = ["GMAIL_TOKEN_PATH=gmail_token.json"]
          lines += [f"{k}={os.environ[k]}" for k in keys if os.environ.get(k)]
          with open("API.env", "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          EOF
          rm -f cookies.txt

      - name: Poll + post one fresh World Cup clip
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
          YTDLP_PROXY: socks5://127.0.0.1:40000
          no_proxy: "127.0.0.1,localhost"   # PO-token provider is local; must bypass the SOCKS proxy
          # Scheduled runs (no inputs) default to PUBLIC (Moemen's go-ahead 2026-07-05,
          # after the English/footage screen shipped) + today window + real upload.
          IN_PRIVACY: ${{ inputs.privacy || 'public' }}
          IN_WINDOW: ${{ inputs.window || 'today' }}
          IN_NO_UPLOAD: ${{ inputs.no_upload }}
          # Goals are owned by the LIVE watcher (worldcup_live.yml) since 2026-07-06: it posts
          # each goal minutes after it happens from the ESPN event feed. Keeping "goal" here too
          # would post the SAME goal twice from two different uploads (dedup is per video id).
          IN_CATEGORIES: ${{ inputs.categories || 'speed,popular,streamer' }}
        run: |
          ARGS=(--privacy "$IN_PRIVACY" --window "$IN_WINDOW" --categories "$IN_CATEGORIES" --platforms youtube,instagram,email)
          if [ "$IN_NO_UPLOAD" == "true" ]; then ARGS+=(--no-upload); fi
          echo "clip_autopost.py ${ARGS[*]}"
          python tools/clip_autopost.py "${ARGS[@]}"

      - name: Upload built Short artifact (inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: momoclip
          path: .tmp/final.mp4
          if-no-files-found: ignore
          retention-days: 7
