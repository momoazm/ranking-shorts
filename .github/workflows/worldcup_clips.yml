name: momoclips - World Cup single clips

# Polls YouTube every ~20 min for a FRESH World-Cup moment (Messi/Ronaldo/big-nation goals,
# iShowSpeed, viral clips), builds ONE branded vertical Short from it, and posts to YouTube +
# Instagram (@momoclips). Dedup (state/used_clips.json) means the same clip is never reposted;
# if nothing new is found the run posts nothing -- that's the "trigger only when something
# happened" behaviour. Runs on GitHub-hosted ubuntu; yt-dlp routes through WARP (YouTube
# bot-checks datacenter IPs). See tools/clip_autopost.py.
#
# ⚠ GO-LIVE IS GATED. The 20-min schedule below is COMMENTED OUT on purpose. Before enabling:
#   1. Rename both handles to @momoclips (YouTube Studio + Instagram) -- Claude can't do that.
#   2. Run once via "Run workflow" with privacy=unlisted, eyeball the Short, then privacy=public.
#   3. Uncomment the `schedule:` block to let it auto-post every 20 min.
# Copyright: official goal footage is heavily Content-ID-claimed; posting it is an accepted risk
# (decision log 2026-07-04).

on:
  # schedule:
  #   - cron: "*/20 * * * *"     # UNCOMMENT to go live (every 20 min). Fires only after go-live steps above.
  workflow_dispatch:
    inputs:
      privacy:
        description: "YouTube privacy for this run"
        type: choice
        options: [unlisted, public, private]
        default: unlisted
      no_upload:
        description: "Build only, post nothing (safest test)"
        type: boolean
        default: false
      window:
        description: "Upload-date window to search"
        type: choice
        options: [today, week]
        default: today

# One run at a time; don't cancel a run that may be mid-upload.
concurrency:
  group: worldcup-clips
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  clip:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      # Persist the posted-clip history across runs so the same clip is never reposted.
      - name: Restore posted-clip history
        uses: actions/cache@v4
        with:
          path: state
          key: momoclips-used-${{ github.run_id }}
          restore-keys: |
            momoclips-used-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: System deps (ffmpeg w/ libass for the burned title card)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-liberation

      - name: Python deps
        run: |
          pip install --upgrade pip
          if ! pip install -r requirements.txt; then
            pip install python-dotenv groq edge-tts imageio-ffmpeg google-api-python-client google-auth google-auth-httplib2 requests httpx tavily-python exa-py yt-dlp
          fi
          pip install --upgrade yt-dlp

      - name: Start Cloudflare WARP (SOCKS proxy for yt-dlp egress)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq && sudo apt-get install -y -qq cloudflare-warp
          for i in 1 2 3 4; do
            warp-cli --accept-tos registration new && break || sleep 15
          done
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          sleep 5
          warp-cli --accept-tos status

      - name: Reconstruct secrets (never committed)
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
        run: |
          python3 - <<'EOF'
          import os
          if not os.environ.get("YOUTUBE_TOKEN_JSON"):
              raise SystemExit("::error::YOUTUBE_TOKEN_JSON secret is empty")
          with open("token.json", "w", encoding="utf-8") as f:
              f.write(os.environ["YOUTUBE_TOKEN_JSON"])
          if os.environ.get("GMAIL_TOKEN_JSON"):
              with open("gmail_token.json", "w", encoding="utf-8") as f:
                  f.write(os.environ["GMAIL_TOKEN_JSON"])
          keys = ["GROQ_API_KEY", "GEMINI_API_KEY", "IG_USER_ID", "IG_ACCESS_TOKEN",
                  "GMAIL_SENDER_EMAIL", "GMAIL_TO", "ZERNIO_API_URL", "ZERNIO_API_KEY",
                  "ZERNIO_YOUTUBE_ID", "ZERNIO_INSTAGRAM_ID"]
          lines = ["GMAIL_TOKEN_PATH=gmail_token.json"]
          lines += [f"{k}={os.environ[k]}" for k in keys if os.environ.get(k)]
          with open("API.env", "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          EOF
          rm -f cookies.txt

      - name: Poll + post one fresh World Cup clip
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
          YTDLP_PROXY: socks5://127.0.0.1:40000
          # Scheduled runs (no inputs) default to unlisted + today window + real upload.
          IN_PRIVACY: ${{ inputs.privacy || 'unlisted' }}
          IN_WINDOW: ${{ inputs.window || 'today' }}
          IN_NO_UPLOAD: ${{ inputs.no_upload }}
        run: |
          ARGS=(--privacy "$IN_PRIVACY" --window "$IN_WINDOW" --platforms youtube,instagram,email)
          if [ "$IN_NO_UPLOAD" == "true" ]; then ARGS+=(--no-upload); fi
          echo "clip_autopost.py ${ARGS[*]}"
          python tools/clip_autopost.py "${ARGS[@]}"

      - name: Upload built Short artifact (inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: momoclip
          path: .tmp/final.mp4
          if-no-files-found: ignore
          retention-days: 7
