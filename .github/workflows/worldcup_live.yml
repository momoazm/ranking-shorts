name: momoclips - World Cup LIVE watcher

# EVENT-DRIVEN World-Cup coverage (Moemen's spec 2026-07-06). Every 15 min a ~30s GATE step
# asks ESPN's free scoreboard JSON "is a match live or kicking off within ~25 min?". If not,
# the job ends there (no pip/ffmpeg/WARP cost). If yes, the full environment is set up and
# tools/watch_worldcup.py runs for the whole match window, polling ESPN every ~75s:
#   GOAL      -> post that goal's clip (targeted YouTube hunt) + iShowSpeed's live reaction
#                (our own capture of his stream -- clip_speed_reaction.py)
#   FULL TIME -> star-player performance recap + brace/hat-trick goal compilation + a Short
#                from TOD-by-beIN's official match-highlights upload when it lands (2026-07-11)
# Posts are PUBLIC by default (channel went public 2026-07-05). state/worldcup_watch.json
# (cached, shared with the 20-min poller's cache) makes everything idempotent across runs.
# To PAUSE: disable this workflow in the Actions UI.

on:
  schedule:
    # SEED ticks only (2026-07-10). The */15 cron stalled TWICE (~3 delivered runs/day instead
    # of ~96 -> EGY-ARG missed 07-08, MAR-FRA missed 07-09): GitHub silently drops most ticks
    # when an account requests hundreds/day. Coverage no longer depends on cron punctuality --
    # any ONE delivered tick starts a RELAY CHAIN (gate --chain): the run naps to a near kickoff
    # and watches, or sleeps ~50 min and re-dispatches itself (dispatch events are delivered
    # reliably). 12 cheap seeds/day just make sure a chain gets seeded.
    - cron: "11 */2 * * *"
  workflow_dispatch:
    inputs:
      relay:
        description: "Internal: chained self-dispatch -- run the honest gate (do not force a watch)"
        type: boolean
        default: false
      privacy:
        description: "YouTube privacy for this run"
        type: choice
        options: [public, unlisted, private]
        default: public
      no_upload:
        description: "Build only, post nothing (safest test)"
        type: boolean
        default: false
      no_speed:
        description: "Skip the iShowSpeed livestream capture"
        type: boolean
        default: false
      date:
        description: "Catch-up: YYYYMMDD scoreboard date (empty = today)"
        type: string
        default: ""
      match:
        description: "Catch-up: only this ESPN event id (empty = all)"
        type: string
        default: ""
      platforms:
        description: "Where to post (e.g. 'youtube' to backfill one platform)"
        type: string
        default: "youtube,instagram,email"
      fresh:
        description: "Backfill: re-hunt/re-post --match's goals, ignoring prior posted state"
        type: boolean
        default: false
      redo_min:
        description: "Backfill: only these goal minutes for --match (e.g. '79,83,90')"
        type: string
        default: ""

# One watcher at a time; never cancel one that may be mid-upload. A cron tick that fires
# while a watcher is running just queues one pending run, which fast-exits afterwards.
concurrency:
  group: worldcup-live
  cancel-in-progress: false

permissions:
  contents: write
  actions: write      # the relay chain re-dispatches this workflow via the GITHUB_TOKEN

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v5

      # Stdlib-only: decide whether anything is worth watching before paying for setup.
      # Scheduled + relayed runs use gate --chain (nap to a near kickoff / sleep ~50 min and
      # re-dispatch / exit for the day). HUMAN dispatches always proceed immediately (that's
      # how a no-upload test or a --date catch-up runs on a quiet day).
      - name: Gate - watch now, relay toward the next kickoff, or exit
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.relay }}" != "true" ]; then
            python3 tools/worldcup_live.py --mode gate --lead-min 25 || true
            ACTION=watch
          else
            GATE=$(python3 tools/worldcup_live.py --mode gate --lead-min 25 --chain)
            echo "$GATE"
            ACTION=$(echo "$GATE" | jq -r '.action // "exit"')
          fi
          echo "decision: $ACTION"
          if [ "$ACTION" = "relay" ]; then
            gh workflow run worldcup_live.yml -R "$GITHUB_REPOSITORY" -f relay=true
          fi
          if [ "$ACTION" = "watch" ]; then echo "watch=true" >> "$GITHUB_OUTPUT"; else echo "watch=false" >> "$GITHUB_OUTPUT"; fi

      # Shared with worldcup_clips.yml's cache family: used_clips.json (cross-pipeline dedup)
      # + worldcup_watch.json (this watcher's per-goal idempotency).
      - name: Restore posted-clip history
        if: steps.gate.outputs.watch == 'true'
        uses: actions/cache@v4
        with:
          path: state
          key: momoclips-used-${{ github.run_id }}
          restore-keys: |
            momoclips-used-

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.watch == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: System deps (ffmpeg w/ libass for the burned title card)
        if: steps.gate.outputs.watch == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-liberation

      - name: Python deps
        if: steps.gate.outputs.watch == 'true'
        run: |
          pip install --upgrade pip
          if ! pip install -r requirements.txt; then
            pip install python-dotenv groq edge-tts imageio-ffmpeg google-api-python-client google-auth google-auth-httplib2 requests httpx tavily-python exa-py yt-dlp
          fi
          pip install --upgrade yt-dlp
          # PO-token provider plugin (auto-discovered by yt-dlp) -- beats the datacenter bot-wall.
          pip install --upgrade bgutil-ytdlp-pot-provider

      - name: Start Cloudflare WARP (SOCKS proxy for yt-dlp egress)
        if: steps.gate.outputs.watch == 'true'
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq && sudo apt-get install -y -qq cloudflare-warp
          for i in 1 2 3 4; do
            warp-cli --accept-tos registration new && break || sleep 15
          done
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          # Poll until WARP is actually Connected -- a fixed sleep races (see worldcup_clips.yml).
          for i in $(seq 1 40); do
            if warp-cli --accept-tos status | grep -q "Connected"; then echo "WARP connected"; break; fi
            sleep 3
          done
          warp-cli --accept-tos status
          if ! curl -s --max-time 25 --proxy socks5h://127.0.0.1:40000 https://ifconfig.me; then
            echo "::error::WARP proxy egress check failed -- yt-dlp would be bot-blocked"; exit 1
          fi
          echo
          # PO-token provider (BgUtils): Docker token server on localhost:4416 so yt-dlp's web/tv
          # clients mint valid proof-of-origin tokens and stop getting bot-walled on datacenter IPs
          # (WARP alone started failing on the MrBeast pipeline 2026-07-08).
          docker run --name bgutil-provider -d --init -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider
          for i in $(seq 1 30); do
            curl -s --max-time 5 http://127.0.0.1:4416/ >/dev/null 2>&1 && { echo "POT provider up"; break; }
            sleep 2
          done

      - name: Reconstruct secrets (never committed)
        if: steps.gate.outputs.watch == 'true'
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
        run: |
          python3 - <<'EOF'
          import os
          if not os.environ.get("YOUTUBE_TOKEN_JSON"):
              raise SystemExit("::error::YOUTUBE_TOKEN_JSON secret is empty")
          with open("token.json", "w", encoding="utf-8") as f:
              f.write(os.environ["YOUTUBE_TOKEN_JSON"])
          if os.environ.get("GMAIL_TOKEN_JSON"):
              with open("gmail_token.json", "w", encoding="utf-8") as f:
                  f.write(os.environ["GMAIL_TOKEN_JSON"])
          keys = ["GROQ_API_KEY", "GEMINI_API_KEY", "IG_USER_ID", "IG_ACCESS_TOKEN",
                  "GMAIL_SENDER_EMAIL", "GMAIL_TO", "ZERNIO_API_URL", "ZERNIO_API_KEY",
                  "ZERNIO_YOUTUBE_ID", "ZERNIO_INSTAGRAM_ID"]
          lines = ["GMAIL_TOKEN_PATH=gmail_token.json"]
          lines += [f"{k}={os.environ[k]}" for k in keys if os.environ.get(k)]
          with open("API.env", "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          EOF
          rm -f cookies.txt

      - name: Watch the match window (goals / Speed / end-of-game)
        if: steps.gate.outputs.watch == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
          YTDLP_PROXY: socks5://127.0.0.1:40000
          no_proxy: "127.0.0.1,localhost"   # PO-token provider is local; must bypass the SOCKS proxy
          IN_PRIVACY: ${{ inputs.privacy || 'public' }}
          IN_NO_UPLOAD: ${{ inputs.no_upload }}
          IN_NO_SPEED: ${{ inputs.no_speed }}
          IN_DATE: ${{ inputs.date }}
          IN_MATCH: ${{ inputs.match }}
          IN_PLATFORMS: ${{ inputs.platforms || 'youtube,instagram,email' }}
          IN_FRESH: ${{ inputs.fresh }}
          IN_REDO_MIN: ${{ inputs.redo_min }}
        run: |
          # 300 (not 320): the chain gate may nap up to ~30 min before this step; keep
          # nap + setup + watch under the 350-min job timeout (hosted hard cap is 360).
          ARGS=(--privacy "$IN_PRIVACY" --max-minutes 300 --platforms "$IN_PLATFORMS")
          if [ "$IN_NO_UPLOAD" == "true" ]; then ARGS+=(--no-upload); fi
          if [ "$IN_NO_SPEED" == "true" ]; then ARGS+=(--no-speed); fi
          if [ "$IN_FRESH" == "true" ]; then ARGS+=(--fresh); fi
          if [ -n "$IN_DATE" ]; then ARGS+=(--date "$IN_DATE"); fi
          if [ -n "$IN_MATCH" ]; then ARGS+=(--match "$IN_MATCH"); fi
          if [ -n "$IN_REDO_MIN" ]; then ARGS+=(--redo-min "$IN_REDO_MIN"); fi
          echo "watch_worldcup.py ${ARGS[*]}"
          python tools/watch_worldcup.py "${ARGS[@]}"

      - name: Upload built videos (inspection)
        if: always() && steps.gate.outputs.watch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: worldcup-live-media
          path: |
            .tmp/final.mp4
            .tmp/wc/*.mp4
          if-no-files-found: ignore
          retention-days: 7

      # Chain FORWARD after a watch: the watcher exits when its match window is done, but a
      # later kickoff today still needs coverage and the next cron tick may never arrive.
      # Re-dispatching (honest gate) keeps the relay chain alive match-to-match. always():
      # even a crashed watch shouldn't kill coverage of tonight's other game.
      - name: Relay forward if more matches remain today
        if: always() && steps.gate.outputs.watch == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GATE=$(python3 tools/worldcup_live.py --mode gate --lead-min 25 || echo '{}')
          echo "$GATE"
          NEXT=$(echo "$GATE" | jq -r '.next_wait_min // empty')
          LIVE=$(echo "$GATE" | jq -r '.watch // false')
          if [ -n "$NEXT" ] || [ "$LIVE" = "true" ]; then
            echo "More football today -- relaying."
            gh workflow run worldcup_live.yml -R "$GITHUB_REPOSITORY" -f relay=true
          else
            echo "Nothing left today; chain ends."
          fi
