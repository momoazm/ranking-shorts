name: ranking-shorts

# Builds & posts a #5->#1 RANKING Short (funny clips pulled from Reddit video posts, WITH their
# own audio) on a SELF-HOSTED runner (your PC). Reddit's v.redd.it CDN 403-blocks GitHub's cloud
# datacenter IPs, so the download must happen from a residential IP -- same reason clipping-auto is
# self-hosted. Steps use PowerShell (Windows PowerShell 5.1), not bash.
on:
  schedule:
    - cron: "0 */4 * * *"      # every 4 hours -> 6 uploads/day (under YouTube's 10k/day quota)
  workflow_dispatch: {}         # manual "Run workflow" button for testing

# NOTE: no `concurrency` group on purpose -- each slot should run independently (see git history).

permissions:
  contents: read

defaults:
  run:
    shell: powershell

jobs:
  post:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false   # keep .venv / state between runs for speed + no-repeat memory

      # Persist the used-clip history across runs so the same Reddit clips aren't repeated.
      - name: Restore used-clip history
        uses: actions/cache@v4
        with:
          path: state
          key: used-clips-${{ github.run_id }}
          restore-keys: |
            used-clips-

      - name: Python venv + deps
        run: |
          if (-not (Test-Path ".venv")) { python -m venv .venv }
          $py = Join-Path (Get-Location) ".venv\Scripts\python.exe"
          Invoke-Expression "& '$py' -m pip install --upgrade pip"
          Invoke-Expression "& '$py' -m pip install -r requirements.txt"
          if ($LASTEXITCODE -ne 0) {
            # faster-whisper (ctranslate2) has no wheels on some Python versions (e.g. 3.14).
            # The RANKING pipeline never needs it, so fall back to the ranking-critical subset.
            Write-Host "::warning::full requirements failed; installing the ranking-critical subset (no faster-whisper)"
            Invoke-Expression "& '$py' -m pip install python-dotenv groq edge-tts imageio-ffmpeg google-api-python-client google-auth google-auth-httplib2 requests httpx tavily-python exa-py yt-dlp"
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }

      - name: Ensure full ffmpeg on PATH
        # Need a real ffmpeg (libass for the burned leaderboard overlay). Prefer a PATH binary,
        # else the winget Gyan build, else fail loudly.
        run: |
          $ff = (Get-Command ffmpeg -ErrorAction SilentlyContinue).Source
          if (-not $ff) {
            $c = Get-ChildItem "$env:LOCALAPPDATA\Microsoft\WinGet\Packages" -Recurse -Filter ffmpeg.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($c) { $ff = $c.FullName }
          }
          if (-not $ff) { Write-Host "::error::ffmpeg not found. Install it: winget install Gyan.FFmpeg"; exit 1 }
          Add-Content -Path $env:GITHUB_PATH -Value (Split-Path $ff)
          Write-Host "Using ffmpeg: $ff"

      - name: Reconstruct secrets (never committed)
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          # --- ZERNIO CHANNEL SECRETS ---
          ZERNIO_API_KEY: ${{ secrets.zernio_api }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.zernio_youtube_id }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.zernio_instagram_id }}
        run: |
          $root = Get-Location
          if (-not $env:GROQ_API_KEY)        { Write-Host "::error::GROQ_API_KEY secret is empty"; exit 1 }
          if (-not $env:YOUTUBE_TOKEN_JSON)  { Write-Host "::error::YOUTUBE_TOKEN_JSON secret is empty"; exit 1 }
          [System.IO.File]::WriteAllText("$root\token.json", $env:YOUTUBE_TOKEN_JSON)
          if ($env:GMAIL_TOKEN_JSON) { [System.IO.File]::WriteAllText("$root\gmail_token.json", $env:GMAIL_TOKEN_JSON) }
          # No cookies.txt on this residential runner -- Reddit (and YouTube) serve it without auth,
          # and a stale cookies.txt would push yt-dlp onto a gated client. Remove any leftover.
          if (Test-Path "$root\cookies.txt") { Remove-Item "$root\cookies.txt" -Force }
          # Build API.env from whichever secrets are present.
          $lines = @("GMAIL_TOKEN_PATH=gmail_token.json")
          foreach ($k in @("GROQ_API_KEY","GEMINI_API_KEY","TAVILY_API_KEY","EXA_API_KEY",
                           "TIKTOK_ACCESS_TOKEN","TIKTOK_REFRESH_TOKEN","TIKTOK_CLIENT_KEY","TIKTOK_CLIENT_SECRET",
                           "IG_USER_ID","IG_ACCESS_TOKEN","GMAIL_SENDER_EMAIL","GMAIL_TO",
                           "ZERNIO_API_URL",
                           # --- ADDED TO API.env WRITING PROCESS ---
                           "ZERNIO_API_KEY","ZERNIO_YOUTUBE_ID","ZERNIO_INSTAGRAM_ID")) {
            $v = [Environment]::GetEnvironmentVariable($k)
            if ($v) { $lines += "$k=$v" }
          }
          [System.IO.File]::WriteAllText("$root\API.env", ($lines -join "`n") + "`n")

      - name: Build + publish one Ranking Short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}    # injected directly too, so the LLM never depends on the file
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          # --- MAP TO LOCAL RUNTIME ENV FOR THE PYTHON SCRIPT ---
          ZERNIO_API_KEY: ${{ secrets.zernio_api }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.zernio_youtube_id }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.zernio_instagram_id }}
        # A #5->#1 ranking Short from funny Reddit clips (with their own audio) -- single trending
        # genre, leaderboard overlay, ducked music bed, NO SFX. Auto-posts to YouTube + Zernio (Instagram) + emails a copy.
        run: |
          $py = Join-Path (Get-Location) ".venv\Scripts\python.exe"
          # Keep the laptop awake for the whole run (an idle sleep mid-run cancels the job).
          $awake = Start-Process $py -ArgumentList "-c","import ctypes,time; ctypes.windll.kernel32.SetThreadExecutionState(0x80000001); time.sleep(86400)" -PassThru -WindowStyle Hidden
          try {
            Invoke-Expression "& '$py' tools/rank_autopost.py --privacy public --platforms youtube,email,zernio"
            if ($LASTEXITCODE -ne 0) { exit 1 }
          } finally {
            Stop-Process -Id $awake.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload final.mp4 artifact (for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short
          path: .tmp/final.mp4
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload manual-post export (video + IG/TikTok captions)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-post
          path: exports/
          if-no-files-found: ignore
          retention-days: 7
