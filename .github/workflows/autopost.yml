- name: Reconstruct secrets (never committed)
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          # --- ADDED YOUR NEW SECRETS HERE ---
          ZERNIO_API_KEY: ${{ secrets.zernio_api }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.zernio_youtube_id }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.zernio_instagram_id }}
        run: |
          $root = Get-Location
          if (-not $env:GROQ_API_KEY)        { Write-Host "::error::GROQ_API_KEY secret is empty"; exit 1 }
          if (-not $env:YOUTUBE_TOKEN_JSON)  { Write-Host "::error::YOUTUBE_TOKEN_JSON secret is empty"; exit 1 }
          [System.IO.File]::WriteAllText("$root\token.json", $env:YOUTUBE_TOKEN_JSON)
          if ($env:GMAIL_TOKEN_JSON) { [System.IO.File]::WriteAllText("$root\gmail_token.json", $env:GMAIL_TOKEN_JSON) }
          
          if (Test-Path "$root\cookies.txt") { Remove-Item "$root\cookies.txt" -Force }
          
          # Build API.env from whichever secrets are present.
          $lines = @("GMAIL_TOKEN_PATH=gmail_token.json")
          foreach ($k in @("GROQ_API_KEY","GEMINI_API_KEY","TAVILY_API_KEY","EXA_API_KEY",
                           "TIKTOK_ACCESS_TOKEN","TIKTOK_REFRESH_TOKEN","TIKTOK_CLIENT_KEY","TIKTOK_CLIENT_SECRET",
                           "IG_USER_ID","IG_ACCESS_TOKEN","GMAIL_SENDER_EMAIL","GMAIL_TO",
                           "ZERNIO_API_URL", 
                           # --- ADDED TO THE API.env WRITER ARRAY ---
                           "ZERNIO_API_KEY", "ZERNIO_YOUTUBE_ID", "ZERNIO_INSTAGRAM_ID")) {
            $v = [Environment]::GetEnvironmentVariable($k)
            if ($v) { $lines += "$k=$v" }
          }
          [System.IO.File]::WriteAllText("$root\API.env", ($lines -join "`n") + "`n")

      - name: Build + publish one Ranking Short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          # --- PASSED DIRECTLY TO THE EXECUTABLE STEP ---
          ZERNIO_API_KEY: ${{ secrets.zernio_api }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.zernio_youtube_id }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.zernio_instagram_id }}
        run: |
          $py = Join-Path (Get-Location) ".venv\Scripts\python.exe"
          $awake = Start-Process $py -ArgumentList "-c","import ctypes,time; ctypes.windll.kernel32.SetThreadExecutionState(0x80000001); time.sleep(86400)" -PassThru -WindowStyle Hidden
          try {
            & $py tools/rank_autopost.py --privacy public --platforms youtube,email,zernio
            if ($LASTEXITCODE -ne 0) { exit 1 }
          } finally {
            Stop-Process -Id $awake.Id -Force -ErrorAction SilentlyContinue
          }
