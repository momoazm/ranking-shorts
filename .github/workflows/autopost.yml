name: ranking-shorts

# Builds & posts a #5->#1 RANKING Short (funny clips pulled from Reddit video posts, WITH their
# own audio) autonomously in GitHub's cloud — works even when your laptop is off. Reddit's RSS +
# v.redd.it CDN serve to servers without cookies (the .json API 403s for bots, but .rss + the CDN
# do not). Cron is UTC and may be delayed a few minutes under load; "every 4h" is approximate.
on:
  schedule:
    - cron: "0 */4 * * *"      # every 4 hours -> 6 uploads/day (under YouTube's 10k/day quota)
  workflow_dispatch: {}         # manual "Run workflow" button for testing

# NOTE: no `concurrency` group on purpose. Cron fires at absolute times (00/04/08/12/16/20 UTC),
# so the schedule never waits for the previous video to finish. A concurrency group would QUEUE a
# new scheduled run behind a still-running one (and GitHub cancels older queued runs = a skipped
# post), which is exactly what we want to avoid. Each ~few-minute run is far shorter than the 4h
# gap, so they don't actually overlap; if one ever overran, letting both run is harmless (still one
# video per slot, 6/day). This keeps every slot on schedule.

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg (with libass for burned overlays)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      # Persist the used-clip history across runs so the same Reddit clips aren't repeated.
      # Unique key per run saves a fresh entry; restore-keys pulls the most recent previous one.
      - name: Restore used-clip history
        uses: actions/cache@v4
        with:
          path: state
          key: used-clips-${{ github.run_id }}
          restore-keys: |
            used-clips-

      - name: Reconstruct secrets (ephemeral runner; never committed)
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Nano Banana visuals (without it, aigen auto-downgrades to gameplay mode).
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional research providers (playbook degrades to model priors if absent).
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          # Optional extra platforms (skipped cleanly until their apps are approved).
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # Gmail delivery of the finished video (semi-manual posting).
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          # YouTube cookies (Netscape format) — REQUIRED for the ranking pipeline in the cloud:
          # datacenter IPs get "confirm you're not a bot" without them.
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::error::GROQ_API_KEY secret is empty or missing. Add it under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          if [ -z "$YOUTUBE_TOKEN_JSON" ]; then
            echo "::error::YOUTUBE_TOKEN_JSON secret is empty or missing. Paste the full contents of clipping/token.json."
            exit 1
          fi
          # YT_COOKIES is unused: clips come from Reddit (RSS + v.redd.it CDN, no cookies needed).
          if [ -z "$YT_COOKIES" ]; then
            echo "::notice::YT_COOKIES not set -- fine, clips come from Reddit which needs no cookies."
          fi
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY empty (only needed if you switch back to the Nano Banana brainrot movie via autopost.py)."
          fi
          printf '%s' "$YOUTUBE_TOKEN_JSON" > token.json
          # Gmail token (separate from the YouTube token) for emailing the finished video.
          if [ -n "$GMAIL_TOKEN_JSON" ]; then printf '%s' "$GMAIL_TOKEN_JSON" > gmail_token.json; fi
          # YouTube cookies for yt-dlp (ranking pipeline downloads) on cloud IPs.
          if [ -n "$YT_COOKIES" ]; then printf '%s' "$YT_COOKIES" > cookies.txt; fi
          # Build API.env from whichever secrets are present (only GROQ + YouTube + GEMINI required).
          : > API.env
          printf 'GMAIL_TOKEN_PATH=gmail_token.json\n' >> API.env
          for kv in GROQ_API_KEY GEMINI_API_KEY TAVILY_API_KEY EXA_API_KEY \
                    TIKTOK_ACCESS_TOKEN TIKTOK_REFRESH_TOKEN TIKTOK_CLIENT_KEY TIKTOK_CLIENT_SECRET \
                    IG_USER_ID IG_ACCESS_TOKEN GMAIL_SENDER_EMAIL GMAIL_TO; do
            val="${!kv}"
            if [ -n "$val" ]; then printf '%s=%s\n' "$kv" "$val" >> API.env; fi
          done

      - name: Build + publish one Ranking Short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}   # also injected directly, so the LLM never depends on the file
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # THE automation: a #5->#1 ranking Short from funny Reddit clips (with their own audio) --
        # single trending genre, leaderboard overlay, ducked music bed, NO SFX. Auto-posts to
        # YouTube + emails a copy. No cookies needed (Reddit RSS + v.redd.it CDN serve servers fine).
        # (The old AI brainrot movie still lives in tools/autopost.py but is no longer scheduled.)
        run: python tools/rank_autopost.py --privacy public --platforms youtube,email

      - name: Upload final.mp4 artifact (for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short
          path: .tmp/final.mp4
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload manual-post export (video + IG/TikTok captions)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-post
          path: exports/
          if-no-files-found: ignore
          retention-days: 7
