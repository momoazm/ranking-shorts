name: ranking-shorts

# Builds & posts a #5->#1 RANKING Short on a GitHub-hosted Ubuntu runner -- no laptop /
# self-hosted runner needed.
#
# Sourcing on cloud IPs (probed 2026-07-03):
#   - YouTube: bot-checks datacenter IPs, but works through Cloudflare WARP's free local
#     SOCKS proxy (YTDLP_PROXY below).
#   - Reddit (v.redd.it): 403-blocks EVERY cloud path (plain IP, WARP, direct DASH files),
#     so NO_REDDIT_SOURCES=1 restricts sourcing to the YouTube "streamer" pool. Adding a
#     paid residential proxy later = set YTDLP_PROXY to its URL and drop NO_REDDIT_SOURCES.
#
# Exact-time posting: GitHub cron can drift 5-30+ min, so each cron fires ~40 min EARLY
# and the "Hold until slot" step sleeps until the exact slot minute.
#
# 2026-07-06: file touched to re-register the cron -- ALL scheduled runs on this account
# silently stopped after 2026-07-05 ~20:37 UTC (no GitHub incident; workflows still "active").

on:
  schedule:
    # Fires at :50 the hour before each slot; the hold step releases at exactly
    # 02:30 / 11:30 / 14:30 / 17:30 / 20:30 / 23:30 UTC -> 6 uploads/day hitting the
    # US morning / lunch / afternoon / evening windows (UTC-4 in July).
    - cron: "50 1,10,13,16,19,22 * * *"
  workflow_dispatch:      # manual "Run workflow" button (from the MOMO site) -- runs immediately
    inputs:
      no_upload:
        description: "Test run (build the Short but do NOT publish anywhere)"
        type: boolean
        default: false

# NOTE: no `concurrency` group on purpose -- each slot should run independently (see git history).

permissions:
  contents: write   # weekly keepalive commit (public repos lose schedules after 60 idle days)

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - name: Hold until the exact slot time (scheduled runs only)
        if: github.event_name == 'schedule'
        run: |
          python3 - <<'EOF'
          # GitHub cron fires early on purpose (and drifts); pin the real start to the slot.
          import datetime, time
          SLOTS_UTC = ["02:30", "11:30", "14:30", "17:30", "20:30", "23:30"]
          now = datetime.datetime.now(datetime.timezone.utc)
          waits = []
          for s in SLOTS_UTC:
              h, m = map(int, s.split(":"))
              t = now.replace(hour=h, minute=m, second=0, microsecond=0)
              for d in (0, 1):
                  delta = (t + datetime.timedelta(days=d) - now).total_seconds()
                  if 0 <= delta <= 55 * 60:
                      waits.append(delta)
          if waits:
              w = min(waits)
              print(f"Sleeping {w:.0f}s until the exact slot...")
              time.sleep(w)
          else:
              print("Cron fired past the slot; running immediately.")
          EOF

      # Persist the used-clip history across runs so the same clips aren't repeated.
      - name: Restore used-clip history
        uses: actions/cache@v4
        with:
          path: state
          key: used-clips-${{ github.run_id }}
          restore-keys: |
            used-clips-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: System deps (ffmpeg w/ libass for the burned leaderboard overlay)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-liberation

      - name: Python deps
        run: |
          pip install --upgrade pip
          if ! pip install -r requirements.txt; then
            # faster-whisper (ctranslate2) has no wheels on some Python versions.
            # The RANKING pipeline never needs it, so fall back to the ranking-critical subset.
            echo "::warning::full requirements failed; installing the ranking-critical subset (no faster-whisper)"
            pip install python-dotenv groq edge-tts imageio-ffmpeg google-api-python-client google-auth google-auth-httplib2 requests httpx tavily-python exa-py yt-dlp
          fi
          # YouTube breaks old yt-dlp builds constantly; force the latest every run.
          pip install --upgrade yt-dlp

      - name: Start Cloudflare WARP (SOCKS proxy for yt-dlp egress)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq && sudo apt-get install -y -qq cloudflare-warp
          for i in 1 2 3 4; do
            warp-cli --accept-tos registration new && break || sleep 15
          done
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          # Poll until actually Connected -- a fixed 5s sleep is flaky (status can still be
          # "Connecting", making every proxied yt-dlp search fail instantly).
          for i in $(seq 1 40); do
            if warp-cli --accept-tos status | grep -q "Connected"; then echo "WARP connected"; break; fi
            sleep 3
          done
          warp-cli --accept-tos status
          if ! curl -s --max-time 25 --proxy socks5h://127.0.0.1:40000 https://ifconfig.me; then
            echo "::error::WARP proxy egress check failed -- yt-dlp would be bot-blocked"; exit 1
          fi
          echo

      - name: Reconstruct secrets (never committed)
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
        run: |
          python3 - <<'EOF'
          import os
          if not os.environ.get("GROQ_API_KEY"):
              raise SystemExit("::error::GROQ_API_KEY secret is empty")
          if not os.environ.get("YOUTUBE_TOKEN_JSON"):
              raise SystemExit("::error::YOUTUBE_TOKEN_JSON secret is empty")
          with open("token.json", "w", encoding="utf-8") as f:
              f.write(os.environ["YOUTUBE_TOKEN_JSON"])
          if os.environ.get("GMAIL_TOKEN_JSON"):
              with open("gmail_token.json", "w", encoding="utf-8") as f:
                  f.write(os.environ["GMAIL_TOKEN_JSON"])
          keys = ["GROQ_API_KEY", "GEMINI_API_KEY", "TAVILY_API_KEY", "EXA_API_KEY",
                  "TIKTOK_ACCESS_TOKEN", "TIKTOK_REFRESH_TOKEN", "TIKTOK_CLIENT_KEY", "TIKTOK_CLIENT_SECRET",
                  "IG_USER_ID", "IG_ACCESS_TOKEN", "GMAIL_SENDER_EMAIL", "GMAIL_TO",
                  "ZERNIO_API_URL", "ZERNIO_API_KEY", "ZERNIO_YOUTUBE_ID", "ZERNIO_INSTAGRAM_ID"]
          lines = ["GMAIL_TOKEN_PATH=gmail_token.json"]
          lines += [f"{k}={os.environ[k]}" for k in keys if os.environ.get(k)]
          with open("API.env", "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          EOF
          # A stale cookies.txt would push yt-dlp onto a gated client; remove any leftover.
          rm -f cookies.txt

      - name: Build + publish one Ranking Short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}    # injected directly too, so the LLM never depends on the file
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZERNIO_API_URL: ${{ secrets.ZERNIO_API_URL }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
          # Cloud sourcing constraints -- see the header comment.
          YTDLP_PROXY: socks5://127.0.0.1:40000
          NO_REDDIT_SOURCES: "1"
          IN_NO_UPLOAD: ${{ inputs.no_upload }}
        run: |
          ARGS=(--privacy public --platforms youtube,email,zernio)
          if [ "$IN_NO_UPLOAD" == "true" ]; then ARGS+=(--no-upload); fi
          python tools/rank_autopost.py "${ARGS[@]}"

      - name: Upload final.mp4 artifact (for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short
          path: .tmp/final.mp4
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload manual-post export (video + IG/TikTok captions)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-post
          path: exports/
          if-no-files-found: ignore
          retention-days: 7

  # GitHub disables cron on repos with no commits for 60 days; this weekly touch keeps
  # the schedule alive (the main job never commits -- state lives in actions/cache).
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v5
      - name: Weekly heartbeat commit (Mondays, first slot only)
        run: |
          if [ "$(date -u +%u)" != "1" ] || [ "$(date -u +%H)" != "01" ]; then
            echo "Not the Monday 01:50 slot; skipping."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u +"%Y-%m-%dT%H:%MZ" > .github/.heartbeat
          git add .github/.heartbeat
          git commit -m "chore: schedule keepalive [skip ci]"
          git pull --rebase origin main || true
          git push
