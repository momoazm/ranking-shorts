name: autopost

# Runs autonomously in GitHub's cloud — works even when your laptop is off.
# Cron is UTC and may be delayed a few minutes under load; "every 4h" is approximate.
on:
  schedule:
    - cron: "0 */4 * * *"      # every 4 hours -> 6 uploads/day (under YouTube's 10k/day quota)
  workflow_dispatch: {}         # manual "Run workflow" button for testing

# Don't pile up overlapping runs; let an in-flight render finish.
concurrency:
  group: autopost
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg (with libass for burned captions)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache faster-whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-tiny-v1

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Reconstruct secrets (ephemeral runner; never committed)
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          printf '%s' "$YOUTUBE_TOKEN_JSON" > token.json
          printf 'GROQ_API_KEY=%s\n' "$GROQ_API_KEY" > API.env

      - name: Build + publish one Short
        run: python tools/autopost.py --privacy public

      - name: Upload final.mp4 artifact (for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short
          path: .tmp/final.mp4
          if-no-files-found: ignore
          retention-days: 7
